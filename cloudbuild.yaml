steps:
  - id: 'run-tests'
    name: 'node:22-alpine'
    entrypoint: 'sh'
    args: ['-c', 'corepack enable pnpm && pnpm install --frozen-lockfile && pnpm typecheck && pnpm test:coverage']

  - id: 'build-container'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    secretEnv:
      - 'NEXT_PUBLIC_FIREBASE_API_KEY'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY \
          -t gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/pulse:latest \
          .

  - id: 'push-container'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA']

  - id: 'deploy-cloud-run'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - pulse
      - --image=gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=NEXT_PUBLIC_FIREBASE_API_KEY=firebase-api-key:latest
      - --set-env-vars=NODE_ENV=production

images:
  - 'gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/pulse:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-api-key/versions/latest
      env: NEXT_PUBLIC_FIREBASE_API_KEY
