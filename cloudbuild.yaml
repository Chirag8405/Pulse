steps:
  - id: 'run-tests'
    name: 'node:22-alpine'
    entrypoint: 'sh'
    secretEnv:
      - 'NEXT_PUBLIC_FIREBASE_API_KEY'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
    env:
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=pulse-492918.firebaseapp.com'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=pulse-492918'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=pulse-492918.firebasestorage.app'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=48556507973'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:48556507973:web:96e6aab3568822814a342c'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-FCJ4P2E39X'
    args: ['-c', 'corepack enable pnpm && pnpm install --frozen-lockfile && pnpm lint && pnpm typecheck && pnpm test:coverage && pnpm build']

  - id: 'build-container'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    secretEnv:
      - 'NEXT_PUBLIC_FIREBASE_API_KEY'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=pulse-492918.firebaseapp.com \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=pulse-492918 \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=pulse-492918.firebasestorage.app \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=48556507973 \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=1:48556507973:web:96e6aab3568822814a342c \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-FCJ4P2E39X \
          -t gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/pulse:latest \
          .

  - id: 'push-container'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA']

  - id: 'deploy-cloud-run'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - pulse
      - --image=gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=NEXT_PUBLIC_FIREBASE_API_KEY=firebase-api-key:latest,NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=google-maps-api-key:latest
      - --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=pulse-492918.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=pulse-492918,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=pulse-492918.firebasestorage.app,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=48556507973,NEXT_PUBLIC_FIREBASE_APP_ID=1:48556507973:web:96e6aab3568822814a342c,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-FCJ4P2E39X,ENABLE_BIGQUERY_AUDIT=true,GOOGLE_BIGQUERY_DATASET=pulse_analytics,GOOGLE_BIGQUERY_AUDIT_TABLE=audit_events,ENABLE_DISTRIBUTED_RATE_LIMIT=true

images:
  - 'gcr.io/$PROJECT_ID/pulse:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/pulse:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-api-key/versions/latest
      env: NEXT_PUBLIC_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/google-maps-api-key/versions/latest
      env: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
